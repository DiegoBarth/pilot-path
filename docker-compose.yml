services:
  postgres:
    image: postgres:16
    container_name: pilotpath-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: pilotpath
      POSTGRES_PASSWORD: pilotpath
      POSTGRES_DB: pilotpath

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: